[package]
name = "dracon-warden"
version = "0.112.12"
edition = "2021"
license = "AGPL-3.0-only"
description = "Git filter encryption and repository hardening for secrets at rest"
readme = "README.md"
repository = "https://github.com/DraconDev/dracon-warden-secret-encrypt-age-git-filter"
homepage = "https://github.com/DraconDev/dracon-warden-secret-encrypt-age-git-filter"
documentation = "https://docs.rs/dracon-warden"
keywords = ["git", "secret", "encrypt", "age", "filter"]
categories = ["command-line-utilities"]
exclude = [".github/", "docs/", "*.md", "!README.md", "Cargo.lock", "target/"]

[dependencies]
age = "0.10"
anyhow = "1.0"
chrono = "0.4"
comfy-table = "7"
clap = { version = "4.5", features = ["derive"] }
globset = "0.4"
hostname = "0.4"
rand = "0.8"
secrecy = "0.8"
zeroize = "1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
walkdir = "2"
dirs = "6.0"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process", "time", "signal", "sync"] }
dracon-security-kit = { package = "dracon-security", path = "../dracon-utilities/dracon-warden/src/security" }

[dev-dependencies]
tempfile = "3"

